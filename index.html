<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --bg-card: #1a1a1a;
            --gold-primary: #d4af37;
            --gold-light: #f4d46a;
            --gold-dark: #aa8c2c;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #666666;
            --border-color: #2a2a2a;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.8;
            color: var(--text-primary);
            background: var(--bg-primary);
        }

        /* 导航栏 */
        header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            font-size: 0.95rem;
            letter-spacing: 1px;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold-primary), var(--gold-light));
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--gold-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 主容器 */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 2rem 2rem;
        }

        /* 个人简介 */
        .hero {
            text-align: center;
            padding: 6rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary), var(--gold-light));
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-size: 3.5rem;
            font-weight: 800;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
            border: 3px solid rgba(212, 175, 55, 0.5);
        }

        .hero h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .hero p {
            color: var(--text-secondary);
            max-width: 550px;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.9;
        }

        .social-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .social-links a {
            padding: 0.7rem 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .social-links a:hover {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            border-color: var(--gold-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        /* 文章列表 */
        .section {
            padding: 4rem 0;
        }

        .section-title {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2.5rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--gold-dark);
            display: inline-block;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--gold-light), var(--gold-primary));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-dark);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .post-card:hover::before {
            opacity: 1;
        }

        .post-date {
            color: var(--gold-primary);
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .post-title {
            font-size: 1.4rem;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .post-title a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s ease;
        }

        .post-title a:hover {
            color: var(--gold-primary);
        }

        .post-excerpt {
            color: var(--text-secondary);
            line-height: 1.9;
        }

        .read-more {
            display: inline-block;
            margin-top: 1.2rem;
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .read-more:hover {
            color: var(--gold-light);
            padding-left: 10px;
        }

        /* 项目展示 */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.4s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-dark);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .project-title {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .project-desc {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 1.2rem;
            line-height: 1.8;
        }

        .project-tags {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .tag {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
            color: var(--bg-primary);
            padding: 0.35rem 0.8rem;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* 页脚 */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 4rem;
        }

        footer p {
            opacity: 0.8;
            font-size: 0.95rem;
        }

        footer .gold-text {
            color: var(--gold-primary);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .nav-links {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            main {
                padding-top: 80px;
            }

            .project-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <nav>
            <a href="#" class="logo">MIFE</a>
            <ul class="nav-links">
                <li><a href="#about">关于</a></li>
                <li><a href="#posts">文章</a></li>
                <li><a href="#projects">项目</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 个人简介 -->
        <section id="about" class="hero">
            <div class="avatar">M</div>
            <h1>MIFE</h1>
            <p>开发者 · 创作者 · 探索者</p>
            <div class="social-links">
                <a href="https://github.com/mife-user" target="_blank">GitHub</a>
                <a href="mailto:15723556393@163.com">Email</a>
            </div>
        </section>

        <!-- 文章列表 -->
        <section id="posts" class="section">
            <h2 class="section-title">ARTICLES</h2>
            <div class="post-list">
                <!-- 文章将在此处发布 -->
            </div>
        </section>

        <!-- 项目展示 -->
        <section id="projects" class="section">
            <h2 class="section-title">PROJECTS</h2>
            <div class="project-grid">
                <!-- 项目将在此处展示 -->
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 <span class="gold-text">MIFE</span>. All rights reserved.</p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem;">Powered by <span class="gold-text">GitHub Pages</span></p>
    </footer>
</body>
</html>
