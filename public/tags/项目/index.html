<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIFE Blog</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg-primary: rgba(10, 10, 10, 0.85);
        --bg-secondary: rgba(18, 18, 18, 0.9);
        --bg-card: rgba(26, 26, 26, 0.9);
        --gold-primary: #d4af37;
        --gold-light: #f4d46a;
        --gold-dark: #aa8c2c;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #666666;
        --border-color: rgba(42, 42, 42, 0.8);
    }

    body {
        font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.8;
        color: var(--text-primary);
        background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)),
                    url('/images/background.jpg') no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
    }

     
    header {
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    nav {
        max-width: 1000px;
        margin: 0 auto;
        padding: 1.2rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo {
        font-size: 1.6rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-decoration: none;
        letter-spacing: 2px;
        transition: all 0.3s ease;
    }

    .logo:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    }

    .nav-links {
        display: flex;
        gap: 2.5rem;
        list-style: none;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--text-secondary);
        transition: all 0.3s ease;
        font-size: 0.95rem;
        letter-spacing: 1px;
        position: relative;
        padding: 0.5rem 0;
    }

    .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--gold-primary), var(--gold-light));
        transition: width 0.3s ease;
    }

    .nav-links a:hover {
        color: var(--gold-primary);
    }

    .nav-links a:hover::after {
        width: 100%;
    }

     
    main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 120px 2rem 2rem;
    }

     
    .hero {
        text-align: center;
        padding: 6rem 0;
        border-bottom: 1px solid var(--border-color);
        animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: url('/images/avatar.jpg') no-repeat center center;
        background-size: cover;
        margin: 0 auto 2rem;
        border: 4px solid rgba(212, 175, 55, 0.6);
        box-shadow: 0 15px 50px rgba(212, 175, 55, 0.4),
                    0 0 30px rgba(212, 175, 55, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.1);
        transition: all 0.4s ease;
        cursor: pointer;
        animation: avatarGlow 3s ease-in-out infinite;
    }

    @keyframes avatarGlow {
        0%, 100% {
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.4),
                        0 0 30px rgba(212, 175, 55, 0.2),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
        }
        50% {
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.6),
                        0 0 50px rgba(212, 175, 55, 0.4),
                        inset 0 0 30px rgba(255, 255, 255, 0.2);
        }
    }

    .avatar:hover {
        transform: scale(1.08) rotate(5deg);
        border-color: var(--gold-light);
        box-shadow: 0 25px 70px rgba(212, 175, 55, 0.7),
                    0 0 60px rgba(212, 175, 55, 0.5);
    }

    .hero h1 {
        font-size: 2.8rem;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
        font-weight: 700;
        letter-spacing: 4px;
        text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .hero .username {
        font-size: 1.2rem;
        color: var(--gold-primary);
        letter-spacing: 3px;
        margin-bottom: 1rem;
        text-transform: uppercase;
    }

    .hero p {
        color: var(--text-secondary);
        max-width: 550px;
        margin: 0 auto;
        font-size: 1.1rem;
        line-height: 1.9;
    }

    .social-links {
        margin-top: 2.5rem;
        display: flex;
        justify-content: center;
        gap: 1.2rem;
        flex-wrap: wrap;
    }

    .social-links a, .btn {
        padding: 0.8rem 1.8rem;
        border: 1px solid var(--border-color);
        border-radius: 30px;
        text-decoration: none;
        color: var(--text-secondary);
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 0.95rem;
        letter-spacing: 1px;
        background: linear-gradient(135deg, rgba(26, 26, 26, 0.8), rgba(18, 18, 18, 0.9));
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4),
                    0 2px 8px rgba(0, 0, 0, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .social-links a::before, .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
        transition: left 0.5s ease;
    }

    .social-links a:hover, .btn:hover {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        border-color: var(--gold-primary);
        color: var(--bg-primary);
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 12px 35px rgba(212, 175, 55, 0.5),
                    0 6px 20px rgba(212, 175, 55, 0.3),
                    0 0 20px rgba(212, 175, 55, 0.2);
    }

    .social-links a:hover::before, .btn:hover::before {
        left: 100%;
    }

    .social-links a:active, .btn:active {
        transform: translateY(-2px) scale(0.98);
    }

     
    .section {
        padding: 4rem 0;
    }

    .section-title {
        font-size: 1.8rem;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 2.5rem;
        padding-bottom: 0.8rem;
        border-bottom: 2px solid var(--gold-dark);
        display: inline-block;
        letter-spacing: 2px;
        font-weight: 600;
    }

    .post-list {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .post-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 2rem;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(10px);
    }

    .post-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(180deg, var(--gold-light), var(--gold-primary));
        opacity: 0;
        transition: opacity 0.4s ease;
    }

    .post-card:hover {
        transform: translateY(-8px);
        border-color: var(--gold-dark);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6),
                    0 10px 30px rgba(212, 175, 55, 0.2);
    }

    .post-card:hover::before {
        opacity: 1;
    }

    .post-date {
        color: var(--gold-primary);
        font-size: 0.85rem;
        margin-bottom: 0.8rem;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .post-title {
        font-size: 1.4rem;
        color: var(--text-primary);
        margin-bottom: 0.8rem;
        font-weight: 600;
    }

    .post-title a {
        text-decoration: none;
        color: inherit;
        transition: color 0.3s ease;
    }

    .post-title a:hover {
        color: var(--gold-primary);
    }

    .post-excerpt {
        color: var(--text-secondary);
        line-height: 1.9;
    }

    .read-more {
        display: inline-block;
        margin-top: 1.2rem;
        color: var(--gold-primary);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        border: 1px solid transparent;
    }

    .read-more:hover {
        color: var(--gold-light);
        background: rgba(212, 175, 55, 0.1);
        border-color: rgba(212, 175, 55, 0.3);
        padding-left: 1.5rem;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
    }

     
    .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 2rem;
    }

    .project-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 2rem;
        transition: all 0.4s ease;
        backdrop-filter: blur(10px);
    }

    .project-card:hover {
        transform: translateY(-8px);
        border-color: var(--gold-dark);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6),
                    0 10px 30px rgba(212, 175, 55, 0.2);
    }

    .project-title {
        font-size: 1.2rem;
        color: var(--text-primary);
        margin-bottom: 0.8rem;
        font-weight: 600;
    }

    .project-desc {
        color: var(--text-secondary);
        font-size: 1rem;
        margin-bottom: 1.2rem;
        line-height: 1.8;
    }

    .project-tags {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
    }

    .tag {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        color: var(--bg-primary);
        padding: 0.4rem 1rem;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        box-shadow: 0 3px 10px rgba(212, 175, 55, 0.3);
        transition: all 0.3s ease;
    }

    .tag:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
    }

     
    footer {
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-color);
        color: var(--text-secondary);
        text-align: center;
        padding: 3rem 2rem;
        margin-top: 4rem;
        backdrop-filter: blur(10px);
    }

    footer p {
        opacity: 0.8;
        font-size: 0.95rem;
    }

    footer .gold-text {
        color: var(--gold-primary);
    }

     
    .lang-switch {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 999;
    }

    .lang-btn {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        background: rgba(26, 26, 26, 0.9);
        border: 1px solid var(--gold-dark);
        border-radius: 20px;
        color: var(--gold-primary);
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
    }

    .lang-btn:hover {
        background: var(--gold-primary);
        color: var(--bg-primary);
        transform: scale(1.05);
        box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
    }

     
    @media (max-width: 600px) {
        .nav-links {
            gap: 1rem;
            font-size: 0.85rem;
        }

        .hero h1 {
            font-size: 1.8rem;
        }

        main {
            padding-top: 80px;
        }

        .project-grid {
            grid-template-columns: 1fr;
        }

        .lang-switch {
            top: 70px;
            right: 10px;
        }
    }
</style>

</head>
<body>
    
<header>
    <nav>
        <a href="#" class="logo">MIFE</a>
        <ul class="nav-links">
            
            <li><a href="#about" data-zh="关于" data-en="关于">关于</a></li>
            
            <li><a href="#posts" data-zh="文章" data-en="文章">文章</a></li>
            
            <li><a href="#projects" data-zh="项目" data-en="项目">项目</a></li>
            
        </ul>
    </nav>
</header>


<div class="lang-switch">
    <button class="lang-btn" onclick="toggleLanguage()">EN</button>
</div>

    
    <main>
        
<section class="section" style="padding-top: 120px;">
    <h2 class="section-title">项目</h2>
    <div class="post-list">
        
        <article class="post-card">
            <div class="post-date">2026-03-09</div>
            <h3 class="post-title">
                <a href="https://mife-user.github.io/projects/demo/">示例项目</a>
            </h3>
            <p class="post-excerpt"><p>这是一个示例项目的描述。</p>
<p>你可以在这里展示你的项目详情。</p></p>
            <a href="https://mife-user.github.io/projects/demo/" class="read-more" data-zh="阅读更多 →" data-en="Read More →">阅读更多 →</a>
        </article>
        
    </div>
</section>

    </main>
    
    
<footer>
    <p>© 2026 <span class="gold-text">MIFE</span>. <span data-zh="版权所有" data-en="All rights reserved">版权所有</span>.</p>
    <p style="margin-top: 0.5rem; font-size: 0.9rem;">
        <span data-zh="技术支持" data-en="Powered by">技术支持</span>: <span class="gold-text">GitHub Pages</span>
    </p>
</footer>

<script>
    let currentLang = 'zh';

    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        const langBtn = document.querySelector('.lang-btn');
        langBtn.textContent = currentLang === 'zh' ? 'EN' : '中文';
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';

        
        document.querySelectorAll('[data-zh][data-en]').forEach(el => {
            el.textContent = currentLang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
        });
    }
</script>

</body>
</html>
