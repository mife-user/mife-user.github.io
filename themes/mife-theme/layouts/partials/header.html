<!-- 导航栏 -->
<header>
    <nav>
        <a href="#" class="logo">{{ .Site.Params.author }}</a>
        <ul class="nav-links">
            {{ range .Site.Menus.main }}
            <li><a href="{{ .URL }}" data-zh="{{ .Name }}" data-en="{{ i18n .Name | default .Name }}">{{ .Name }}</a></li>
            {{ end }}
        </ul>
        <button class="search-btn" onclick="toggleSearch()" title="搜索" data-zh="搜索" data-en="Search">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        </button>
    </nav>
</header>

<!-- 搜索弹窗 -->
<div class="search-overlay" id="search-overlay" onclick="toggleSearch()">
    <div class="search-modal" onclick="event.stopPropagation()">
        <div class="search-header">
            <svg class="search-icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="搜索文章或标签..." data-zh-placeholder="搜索文章或标签..." data-enplaceholder="Search articles or tags...">
            <button class="search-close" onclick="toggleSearch()">✕</button>
        </div>
        <div class="search-results" id="search-results"></div>
    </div>
</div>

<!-- 语言切换按钮 -->
<div class="lang-switch">
    <button class="lang-btn" onclick="toggleLanguage()">EN</button>
</div>
