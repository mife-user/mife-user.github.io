{{- $githubUsername := .Site.Params.githubUsername | default "mife-user" -}}
{{- $repo := .Site.Params.repo | default "my-blog" -}}
{{- $issueLabel := .Site.Params.issueLabel | default "comments" -}}

<div class="comments-section" id="comments">
    <div class="comments-header">
        <h3 class="comments-title" data-zh="评论" data-en="Comments">评论</h3>
        <div class="comments-info">
            <span class="comments-count" id="comments-count">
                <span class="loading" data-zh="加载中..." data-en="Loading...">加载中...</span>
            </span>
        </div>
    </div>

    <div class="comments-container" id="comments-container">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p data-zh="加载评论中..." data-en="Loading comments...">加载评论中...</p>
        </div>
    </div>

    <div class="comment-actions">
        <a href="#" class="btn comment-btn" id="write-comment-btn" data-zh="写评论" data-en="Write a Comment">写评论</a>
        <a href="#" class="btn github-btn" id="github-link" target="_blank" rel="noopener noreferrer">
            <svg class="github-icon" viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-1.334-.991-.665-.118-1.644.696-1.644.455 0 .848.466.848.466.488-.809 1.279-1.361 2.155-1.361.588 0 1.15.061 1.686.179.543-1.093 1.377-1.834 2.31-1.834.735 0 1.437.275 1.976.761.559-.11 1.159-.179 1.784-.179 3.491 0 5.467 1.334 5.467 1.334.814 0 .907.979-.083 1.644 0 0 .875.669 1.866 1.334.979.665 1.167 1.644.696 1.644.814 0 1.542.979 1.542 1.644 0 .577.194.949.793.577C20.566 21.797 24 17.302 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            <span data-zh="在 GitHub 上查看" data-en="View on GitHub">在 GitHub 上查看</span>
        </a>
    </div>
</div>

<style>
    .comments-section {
        margin-top: 4rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border-color);
    }

    .comments-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }

    .comments-title {
        font-size: 1.5rem;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 600;
    }

    .comments-info {
        font-size: 0.9rem;
        color: var(--text-secondary);
    }

    .comments-count {
        color: var(--gold-primary);
        font-weight: 600;
    }

    .comments-container {
        margin-bottom: 2rem;
    }

    .loading-spinner {
        text-align: center;
        padding: 3rem 0;
        color: var(--text-secondary);
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-color);
        border-top-color: var(--gold-primary);
        border-radius: 50%;
        margin: 0 auto 1rem;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .comment-item {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        transition: all 0.3s ease;
    }

    .comment-item:hover {
        border-color: var(--gold-dark);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);
    }

    .comment-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(42, 42, 42, 0.5);
    }

    .comment-author-avatar {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 2px solid var(--gold-dark);
    }

    .comment-author-info {
        flex: 1;
    }

    .comment-author-name {
        font-weight: 600;
        color: var(--gold-primary);
        font-size: 1rem;
    }

    .comment-date {
        font-size: 0.8rem;
        color: var(--text-muted);
    }

    .comment-badge {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        color: var(--bg-primary);
        padding: 0.2rem 0.6rem;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 0.5rem;
    }

    .comment-body {
        color: var(--text-secondary);
        line-height: 1.8;
        font-size: 0.95rem;
    }

    .comment-body p {
        margin-bottom: 1rem;
    }

    .comment-body p:last-child {
        margin-bottom: 0;
    }

    .comment-body code {
        background: rgba(212, 175, 55, 0.1);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.9em;
        color: var(--gold-light);
    }

    .comment-body pre {
        background: rgba(10, 10, 10, 0.6);
        padding: 1rem;
        border-radius: 8px;
        overflow-x: auto;
        margin: 1rem 0;
        border: 1px solid var(--border-color);
    }

    .comment-body blockquote {
        border-left: 3px solid var(--gold-dark);
        padding-left: 1rem;
        margin: 1rem 0;
        color: var(--text-muted);
        font-style: italic;
    }

    .comment-body img {
        max-width: 100%;
        border-radius: 8px;
        margin: 1rem 0;
    }

    .comment-body a {
        color: var(--gold-primary);
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .comment-body a:hover {
        color: var(--gold-light);
        text-decoration: underline;
    }

    .no-comments {
        text-align: center;
        padding: 3rem 0;
        color: var(--text-muted);
    }

    .no-comments-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.5;
    }

    .comment-actions {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
    }

    .comment-btn, .github-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8rem 1.5rem;
        border-radius: 30px;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
    }

    .comment-btn {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        color: var(--bg-primary);
        border: none;
    }

    .comment-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
    }

    .github-btn {
        background: linear-gradient(135deg, rgba(26, 26, 26, 0.8), rgba(18, 18, 18, 0.9));
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
    }

    .github-btn:hover {
        border-color: var(--gold-dark);
        color: var(--gold-primary);
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
    }

    .github-icon {
        transition: transform 0.3s ease;
    }

    .github-btn:hover .github-icon {
        transform: scale(1.1);
    }

    .error-message {
        background: rgba(220, 38, 38, 0.1);
        border: 1px solid rgba(220, 38, 38, 0.3);
        border-radius: 8px;
        padding: 1rem;
        color: #f87171;
        text-align: center;
    }

    @media (max-width: 768px) {
        .comments-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 1rem;
        }

        .comment-actions {
            flex-direction: column;
        }

        .comment-btn, .github-btn {
            width: 100%;
            justify-content: center;
        }

        .comment-item {
            padding: 1.2rem;
        }

        .comment-header {
            gap: 0.8rem;
        }

        .comment-author-avatar {
            width: 40px;
            height: 40px;
        }
    }
</style>

<script>
(function() {
    const githubUsername = '{{ $githubUsername }}';
    const repo = '{{ $repo }}';
    const label = '{{ $issueLabel }}';
    const pageTitle = '{{ .Title | htmlEscape }}';
    const pageUrl = '{{ .Permalink }}';
    // 从页面 URL 提取 slug（文章标识）
    const pageSlug = pageUrl.replace(/\/$/, '').split('/').pop();

    const commentsContainer = document.getElementById('comments-container');
    const commentsCount = document.getElementById('comments-count');
    const writeCommentBtn = document.getElementById('write-comment-btn');
    const githubLink = document.getElementById('github-link');

    // 生成 Issue 标题
    const issueTitle = `评论：${pageTitle}`;

    // 更新 GitHub 链接 - 使用标题搜索
    githubLink.href = `https://github.com/${githubUsername}/${repo}/issues?q=${encodeURIComponent('评论：' + pageTitle)}`;

    // 写入评论按钮
    writeCommentBtn.addEventListener('click', function(e) {
        e.preventDefault();
        // 构建 Issue URL，自动带上 labels 参数
        const newIssueUrl = `https://github.com/${githubUsername}/${repo}/issues/new?title=${encodeURIComponent(issueTitle)}&body=${encodeURIComponent('请在此处输入您的评论...\n\n---\n请确保 Issue 已添加 comments 标签，否则评论无法显示。')}&labels=${encodeURIComponent(label)}`;
        window.open(newIssueUrl, '_blank');
    });

    // 获取评论
    async function fetchComments() {
        try {
            // 先获取所有 issues
            const response = await fetch(`https://api.github.com/repos/${githubUsername}/${repo}/issues?state=all&per_page=100`);

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const issues = await response.json();

            // 过滤出当前页面的评论 - 多种匹配方式
            const pageIssues = issues.filter(issue => {
                // 检查是否有评论标签
                const labels = issue.labels || [];
                const hasLabel = labels.some(l => l.name === label);
                if (!hasLabel) return false;

                // 匹配方式 1: 标题精确匹配 "评论：{标题}"
                if (issue.title === `评论：${pageTitle}`) return true;

                // 匹配方式 2: 标题包含页面 slug（用于兼容旧数据）
                const slugMatch = issue.title.toLowerCase().includes(pageSlug.toLowerCase());
                if (slugMatch) return true;

                // 匹配方式 3: 标题包含页面标题的主要部分（忽略大小写）
                const titleLower = issue.title.toLowerCase();
                const pageTitleLower = pageTitle.toLowerCase();
                // 提取标题关键词（去掉 "评论：" 前缀）
                const cleanTitle = titleLower.replace(/^评论：/, '').replace(/^comment:/, '');
                if (cleanTitle.includes(pageTitleLower) || pageTitleLower.includes(cleanTitle)) return true;

                // 匹配方式 4: 提取关键词匹配（兼容大小写和简写）
                // 例如："TERMUX 从零搭建博客" 匹配 "Termux 从零搭建博客：npm + AI..."
                const issueKeywords = cleanTitle.split(/[\s:：]+/).filter(w => w.length > 1);
                const pageKeywords = pageTitleLower.split(/[\s:：]+/).filter(w => w.length > 1);
                const matchCount = issueKeywords.filter(k => pageKeywords.some(pk => pk.includes(k) || k.includes(pk))).length;
                // 如果有 3 个或以上关键词匹配，认为是同一篇文章
                if (matchCount >= 3) return true;

                return false;
            });

            // 按创建时间排序（最新的在前）
            pageIssues.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            displayComments(pageIssues);
            updateCount(pageIssues.length);

        } catch (error) {
            console.error('获取评论失败:', error);
            commentsContainer.innerHTML = `
                <div class="error-message">
                    <p data-zh="加载评论失败，请稍后再试" data-en="Failed to load comments, please try again later">加载评论失败，请稍后再试</p>
                </div>
            `;
        }
    }

    // 显示评论
    function displayComments(issues) {
        if (issues.length === 0) {
            commentsContainer.innerHTML = `
                <div class="no-comments">
                    <div class="no-comments-icon">💬</div>
                    <p data-zh="暂无评论，快来抢沙发吧！" data-en="No comments yet, be the first one!">暂无评论，快来抢沙发吧！</p>
                </div>
            `;
            return;
        }

        let html = '';
        issues.forEach((issue, index) => {
            const date = new Date(issue.created_at);
            const formattedDate = date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });

            const isAuthor = issue.user.login === githubUsername;
            
            // 处理评论 body 中的 markdown 内容
            let body = issue.body || '';
            body = body.replace(/\r\n/g, '<br>');
            body = body.replace(/\n/g, '<br>');
            
            // 简单的链接处理
            body = body.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');

            html += `
                <div class="comment-item">
                    <div class="comment-header">
                        <img src="${issue.user.avatar_url}" alt="${issue.user.login}" class="comment-author-avatar">
                        <div class="comment-author-info">
                            <span class="comment-author-name">${issue.user.login}</span>
                            ${isAuthor ? '<span class="comment-badge" data-zh="作者" data-en="Author">作者</span>' : ''}
                        </div>
                        <span class="comment-date">${formattedDate}</span>
                    </div>
                    <div class="comment-body">
                        ${body}
                    </div>
                </div>
            `;
        });

        commentsContainer.innerHTML = html;
    }

    // 更新评论数量
    function updateCount(count) {
        commentsCount.textContent = `${count} ${count === 1 ? '条评论' : '条评论'}`;
    }

    // 初始化
    fetchComments();
})();
</script>
