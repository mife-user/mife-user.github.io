<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg-primary: rgba(10, 10, 10, 0.85);
        --bg-secondary: rgba(18, 18, 18, 0.9);
        --bg-card: rgba(26, 26, 26, 0.9);
        --gold-primary: #d4af37;
        --gold-light: #f4d46a;
        --gold-dark: #aa8c2c;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-muted: #666666;
        --border-color: rgba(42, 42, 42, 0.8);
    }

    body {
        font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.8;
        color: var(--text-primary);
        background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)),
                    url('{{ .Site.Params.background | relURL }}') no-repeat center center;
        background-size: cover;
        background-attachment: scroll;
        min-height: 100vh;
        -webkit-background-size: cover;
        -moz-background-size: cover;
        -o-background-size: cover;
    }

    /* PC 端背景优化 - 视差效果 */
    @media (min-width: 1024px) {
        body {
            background-attachment: fixed;
        }
    }

    /* 移动端背景优化 - 禁用固定背景以提升性能 */
    @media (max-width: 768px) {
        body {
            background-attachment: scroll;
            background-position: center top;
        }
    }

    /* 小屏手机优化 */
    @media (max-width: 480px) {
        body {
            background-position: center center;
        }
    }

    /* 导航栏 */
    header {
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    nav {
        max-width: 1000px;
        margin: 0 auto;
        padding: 1.2rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo {
        font-size: 1.6rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-decoration: none;
        letter-spacing: 2px;
        transition: all 0.3s ease;
    }

    .logo:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    }

    .nav-links {
        display: flex;
        gap: 2.5rem;
        list-style: none;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--text-secondary);
        transition: all 0.3s ease;
        font-size: 0.95rem;
        letter-spacing: 1px;
        position: relative;
        padding: 0.5rem 0;
    }

    .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--gold-primary), var(--gold-light));
        transition: width 0.3s ease;
    }

    .nav-links a:hover {
        color: var(--gold-primary);
    }

    .nav-links a:hover::after {
        width: 100%;
    }

    /* 主容器 */
    main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 120px 2rem 2rem;
    }

    /* 个人简介 */
    .hero {
        text-align: center;
        padding: 6rem 0;
        border-bottom: 1px solid var(--border-color);
        animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: url('{{ .Site.Params.avatar | relURL }}') no-repeat center center;
        background-size: cover;
        margin: 0 auto 2rem;
        border: 4px solid rgba(212, 175, 55, 0.6);
        box-shadow: 0 15px 50px rgba(212, 175, 55, 0.4),
                    0 0 30px rgba(212, 175, 55, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.1);
        transition: all 0.4s ease;
        cursor: pointer;
        animation: avatarGlow 3s ease-in-out infinite;
        position: relative;
        z-index: 1100;
    }

    @keyframes avatarGlow {
        0%, 100% {
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.4),
                        0 0 30px rgba(212, 175, 55, 0.2),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
        }
        50% {
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.6),
                        0 0 50px rgba(212, 175, 55, 0.4),
                        inset 0 0 30px rgba(255, 255, 255, 0.2);
        }
    }

    .avatar:hover {
        transform: scale(1.08) rotate(5deg);
        border-color: var(--gold-light);
        box-shadow: 0 25px 70px rgba(212, 175, 55, 0.7),
                    0 0 60px rgba(212, 175, 55, 0.5);
    }

    .hero h1 {
        font-size: 2.8rem;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
        font-weight: 700;
        letter-spacing: 4px;
        text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .hero .username {
        font-size: 1.2rem;
        color: var(--gold-primary);
        letter-spacing: 3px;
        margin-bottom: 1rem;
        text-transform: uppercase;
    }

    .hero p {
        color: var(--text-secondary);
        max-width: 550px;
        margin: 0 auto;
        font-size: 1.1rem;
        line-height: 1.9;
    }

    .social-links {
        margin-top: 2.5rem;
        display: flex;
        justify-content: center;
        gap: 1.2rem;
        flex-wrap: wrap;
    }

    .social-links a, .btn {
        padding: 0.8rem 1.8rem;
        border: 1px solid var(--border-color);
        border-radius: 30px;
        text-decoration: none;
        color: var(--text-secondary);
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 0.95rem;
        letter-spacing: 1px;
        background: linear-gradient(135deg, rgba(26, 26, 26, 0.8), rgba(18, 18, 18, 0.9));
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4),
                    0 2px 8px rgba(0, 0, 0, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .social-links a::before, .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
        transition: left 0.5s ease;
    }

    .social-links a:hover, .btn:hover {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        border-color: var(--gold-primary);
        color: var(--bg-primary);
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 12px 35px rgba(212, 175, 55, 0.5),
                    0 6px 20px rgba(212, 175, 55, 0.3),
                    0 0 20px rgba(212, 175, 55, 0.2);
    }

    .social-links a:hover::before, .btn:hover::before {
        left: 100%;
    }

    .social-links a:active, .btn:active {
        transform: translateY(-2px) scale(0.98);
    }

    /* 文章列表 */
    .section {
        padding: 4rem 0;
    }

    .section-title {
        font-size: 1.8rem;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 2.5rem;
        padding-bottom: 0.8rem;
        border-bottom: 2px solid var(--gold-dark);
        display: inline-block;
        letter-spacing: 2px;
        font-weight: 600;
    }

    .post-list {
        display: flex;
        flex-direction: column;
        gap: 2rem;
    }

    .post-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 2rem;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(10px);
    }

    .post-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(180deg, var(--gold-light), var(--gold-primary));
        opacity: 0;
        transition: opacity 0.4s ease;
    }

    .post-card:hover {
        transform: translateY(-8px);
        border-color: var(--gold-dark);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6),
                    0 10px 30px rgba(212, 175, 55, 0.2);
    }

    .post-card:hover::before {
        opacity: 1;
    }

    .post-date {
        color: var(--gold-primary);
        font-size: 0.85rem;
        margin-bottom: 0.8rem;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .post-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.8rem;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .post-tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
    }

    .tag-link {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        color: var(--bg-primary);
        padding: 0.25rem 0.8rem;
        border-radius: 15px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(212, 175, 55, 0.2);
    }

    .tag-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
    }

    .post-title {
        font-size: 1.4rem;
        color: var(--text-primary);
        margin-bottom: 0.8rem;
        font-weight: 600;
    }

    .post-title a {
        text-decoration: none;
        color: inherit;
        transition: color 0.3s ease;
    }

    .post-title a:hover {
        color: var(--gold-primary);
    }

    .post-excerpt {
        color: var(--text-secondary);
        line-height: 1.9;
    }

    .read-more {
        display: inline-block;
        margin-top: 1.2rem;
        color: var(--gold-primary);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        border: 1px solid transparent;
    }

    .read-more:hover {
        color: var(--gold-light);
        background: rgba(212, 175, 55, 0.1);
        border-color: rgba(212, 175, 55, 0.3);
        padding-left: 1.5rem;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
    }

    /* 项目展示 */
    .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
    }

    .project-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 2rem;
        transition: all 0.4s ease;
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
    }

    .project-card:hover {
        transform: translateY(-8px);
        border-color: var(--gold-dark);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6),
                    0 10px 30px rgba(212, 175, 55, 0.2);
    }

    .project-meta {
        margin-bottom: 1rem;
    }

    .project-title {
        font-size: 1.3rem;
        color: var(--gold-primary);
        margin-bottom: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .project-tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
    }

    .tag {
        background: var(--bg-card);
        color: var(--gold-primary);
        padding: 0.35rem 0.9rem;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        border: 1px solid rgba(212, 175, 55, 0.3);
        transition: all 0.3s ease;
    }

    .tag:hover {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        color: var(--bg-primary);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
    }

    .project-desc {
        color: var(--text-secondary);
        font-size: 1rem;
        margin-bottom: 1.5rem;
        line-height: 1.8;
        flex-grow: 1;
    }

    .project-link {
        color: var(--gold-light);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
    }

    .project-link:hover {
        opacity: 0.8;
        transform: translateX(5px);
    }

    /* 页脚 */
    footer {
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-color);
        color: var(--text-secondary);
        text-align: center;
        padding: 3rem 2rem;
        margin-top: 4rem;
        backdrop-filter: blur(10px);
    }

    footer p {
        opacity: 0.8;
        font-size: 0.95rem;
    }

    footer .gold-text {
        color: var(--gold-primary);
    }

    /* 语言切换分样式 */
    .lang-switch {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 999;
    }

    .lang-btn {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        background: rgba(26, 26, 26, 0.9);
        border: 1px solid var(--gold-dark);
        border-radius: 20px;
        color: var(--gold-primary);
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
    }

    .lang-btn:hover {
        background: var(--gold-primary);
        color: var(--bg-primary);
        transform: scale(1.05);
        box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
    }

    /* 响应式基础优化 */
    img {
        max-width: 100%;
        height: auto;
        display: block;
    }

    .content, .post-content, .article {
        word-wrap: break-word;
        overflow-wrap: break-word;
        max-width: 100%;
    }

    .content img, .post-content img, .article img {
        max-width: 100%;
        height: auto;
        margin: 1.5rem auto;
    }

    pre, table {
        max-width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    /* 平板适配 (768px 以下) */
    @media (max-width: 768px) {
        nav {
            padding: 0.8rem 1rem;
            flex-direction: column;
            gap: 0.8rem;
        }

        .nav-links {
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            font-size: 0.9rem;
        }

        .search-nav-item {
            display: inline-block;
        }

        .search-btn {
            margin-left: 0.5rem;
            padding: 0.3rem;
        }

        .search-btn .search-icon {
            width: 20px;
            height: 20px;
        }

        .logo {
            font-size: 1.4rem;
        }

        main {
            padding: 140px 1rem 1rem;
        }

        .hero {
            padding: 3rem 0;
        }

        .hero h1 {
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .hero .username {
            font-size: 1rem;
        }

        .hero p {
            font-size: 1rem;
            padding: 0 1rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin-bottom: 1.5rem;
        }

        .social-links {
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .social-links a, .btn {
            padding: 0.7rem 1.2rem;
            font-size: 0.9rem;
        }

        .section {
            padding: 2.5rem 0;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .post-card {
            padding: 1.5rem;
            margin: 0 0.5rem;
        }

        .post-title {
            font-size: 1.2rem;
        }

        .post-excerpt {
            font-size: 0.95rem;
        }

        .project-grid {
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .project-card {
            padding: 1.5rem;
            margin: 0 0.5rem;
        }

        .project-title {
            font-size: 1.1rem;
        }

        .project-desc {
            font-size: 0.95rem;
        }

        .tag {
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
        }

        footer {
            padding: 2rem 1rem;
        }

        footer p {
            font-size: 0.85rem;
        }

        .lang-switch {
            top: 60px;
            right: 10px;
        }

        .lang-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        article {
            padding: 1rem !important;
        }

        article h1 {
            font-size: 1.8rem !important;
        }

        .content {
            font-size: 1rem;
            line-height: 1.9;
        }
    }

    /* 小屏手机适配 (480px 以下) */
    @media (max-width: 480px) {
        nav {
            padding: 0.6rem 0.8rem;
            gap: 0.5rem;
        }

        .logo {
            font-size: 1.2rem;
        }

        .nav-links {
            gap: 0.8rem;
        }

        .nav-links a {
            font-size: 0.85rem;
        }

        .hero {
            padding: 2rem 0;
        }

        .hero h1 {
            font-size: 1.6rem;
        }

        .hero p {
            font-size: 0.95rem;
        }

        .avatar {
            width: 100px;
            height: 100px;
            z-index: 1100;
        }

        .social-links {
            flex-direction: column;
            align-items: center;
        }

        .social-links a, .btn {
            width: 80%;
            text-align: center;
        }

        .post-card, .project-card {
            padding: 1.2rem;
            border-radius: 8px;
        }

        .post-title {
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.3rem;
        }

        code {
            font-size: 0.85rem;
        }

        blockquote {
            margin: 1rem 0;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
        }
    }

    /* 超小屏幕 (360px 以下) */
    @media (max-width: 360px) {
        .hero h1 {
            font-size: 1.4rem;
        }

        .nav-links a {
            font-size: 0.8rem;
        }

        .section-title {
            font-size: 1.2rem;
        }

        main {
            padding: 90px 0.5rem 0.5rem;
        }
    }

    /* 横屏模式优化 */
    @media (max-height: 500px) and (orientation: landscape) {
        .hero {
            padding: 2rem 0;
        }

        main {
            padding: 80px 2rem 2rem;
        }

        nav {
            padding: 0.8rem 1rem;
        }
    }

    /* 音乐播放按钮 - 圆形唱片样式 */
    .music-player {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 1000;
    }

    .music-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary), var(--gold-light));
        border: 3px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.5),
                    0 0 30px rgba(212, 175, 55, 0.3),
                    inset 0 0 15px rgba(0, 0, 0, 0.3);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .music-btn::before {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        background: rgba(10, 10, 10, 0.9);
        border-radius: 50%;
        border: 2px solid rgba(212, 175, 55, 0.5);
    }

    .music-btn::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px dashed rgba(255, 255, 255, 0.3);
        animation: none;
    }

    .music-btn.playing {
        animation: rotate 3s linear infinite;
    }

    .music-btn.playing::after {
        animation: rotate 8s linear infinite reverse;
    }

    @keyframes rotate {
        from {
            transform: rotate(0deg);
        }
        to {
            transform: rotate(360deg);
        }
    }

    .music-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 30px rgba(212, 175, 55, 0.7),
                    0 0 50px rgba(212, 175, 55, 0.5);
    }

    .music-btn:active {
        transform: scale(0.95);
    }

    /* 播放/暂停图标 */
    .music-icon {
        position: absolute;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 8px 0 8px 14px;
        border-color: transparent transparent transparent rgba(10, 10, 10, 0.9);
        left: 50%;
        top: 50%;
        transform: translate(-30%, -50%);
        transition: all 0.3s ease;
    }

    .music-btn.paused .music-icon {
        border-width: 8px 0 8px 14px;
        border-color: transparent transparent transparent rgba(10, 10, 10, 0.9);
        transform: translate(-30%, -50%);
    }

    .music-btn.paused .music-icon::after {
        content: '';
        position: absolute;
        left: 18px;
        top: -8px;
        width: 4px;
        height: 16px;
        background: rgba(10, 10, 10, 0.9);
        border-radius: 1px;
    }

    .music-btn.paused .music-icon::before {
        content: '';
        position: absolute;
        left: 8px;
        top: -8px;
        width: 4px;
        height: 16px;
        background: rgba(10, 10, 10, 0.9);
        border-radius: 1px;
    }

    /* 音波动画 */
    .music-wave {
        position: absolute;
