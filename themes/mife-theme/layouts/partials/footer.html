<!-- 页脚 -->
<footer>
    <p>© {{ now.Year }} <span class="gold-text">{{ .Site.Params.author }}</span>. <span data-zh="版权所有" data-en="All rights reserved">版权所有</span>.</p>
    <p style="margin-top: 0.5rem; font-size: 0.9rem;">
        <span data-zh="技术支持" data-en="Powered by">技术支持</span>: <span class="gold-text">GitHub Pages</span>
    </p>
</footer>

<!-- 音乐播放器 -->
<div class="music-player">
    <button class="music-btn paused" id="musicBtn" aria-label="播放音乐">
        <div class="music-wave"></div>
        <div class="music-wave"></div>
        <div class="music-wave"></div>
        <div class="music-icon"></div>
    </button>
</div>

<!-- 音频元素 -->
<audio id="bgMusic" loop>
    <source src="/audio/削除 Nikki Simmons - Destr0yer.mp3" type="audio/mpeg">
</audio>

<script>
    let currentLang = 'zh';
    let isPlaying = false;
    const musicBtn = document.getElementById('musicBtn');
    const bgMusic = document.getElementById('bgMusic');

    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        const langBtn = document.querySelector('.lang-btn');
        langBtn.textContent = currentLang === 'zh' ? 'EN' : '中文';
        document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';

        // 更新所有具有 data-zh 和 data-en 属性的元素
        document.querySelectorAll('[data-zh][data-en]').forEach(el => {
            el.textContent = currentLang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
        });

        // 通知分页组件语言已切换
        document.dispatchEvent(new CustomEvent('languagechange', { detail: { lang: currentLang } }));
    }

    // 音乐播放控制
    function toggleMusic() {
        if (isPlaying) {
            bgMusic.pause();
            musicBtn.classList.add('paused');
            musicBtn.classList.remove('playing');
        } else {
            bgMusic.play();
            musicBtn.classList.remove('paused');
            musicBtn.classList.add('playing');
        }
        isPlaying = !isPlaying;
    }

    musicBtn.addEventListener('click', toggleMusic);

    // 页面加载完成后自动播放
    window.addEventListener('load', function() {
        // 尝试自动播放
        bgMusic.play().then(() => {
            isPlaying = true;
            musicBtn.classList.remove('paused');
            musicBtn.classList.add('playing');
        }).catch(() => {
            // 如果自动播放被阻止，保持暂停状态
            isPlaying = false;
            musicBtn.classList.add('paused');
            musicBtn.classList.remove('playing');
        });
    });

    // 音频播放结束时重置状态
    bgMusic.addEventListener('ended', function() {
        isPlaying = false;
        musicBtn.classList.add('paused');
        musicBtn.classList.remove('playing');
    });

    // 搜索功能
    const searchOverlay = document.getElementById('search-overlay');
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const searchBtn = document.getElementById('search-btn');
    const searchClose = document.getElementById('search-close');
    const searchConfirm = document.getElementById('search-confirm');
    const allPosts = [];

    function toggleSearch() {
        searchOverlay.classList.toggle('active');
        if (searchOverlay.classList.contains('active')) {
            setTimeout(() => searchInput.focus(), 100);
            loadPosts();
        }
    }

    // 执行搜索
    function doSearch() {
        const query = searchInput.value.trim().toLowerCase();
        if (query.length === 0) {
            searchResults.innerHTML = '';
            return;
        }

        const results = allPosts.filter(post => {
            const titleMatch = post.title.toLowerCase().includes(query);
            const tagsMatch = post.tags && post.tags.some(tag => tag.toLowerCase().includes(query));
            const summaryMatch = post.summary && post.summary.toLowerCase().includes(query);
            return titleMatch || tagsMatch || summaryMatch;
        });

        if (results.length === 0) {
            searchResults.innerHTML = '<div class="search-no-results">未找到相关文章</div>';
        } else {
            searchResults.innerHTML = results.map(post => {
                const tagsHtml = post.tags ? post.tags.map(tag =>
                    `<span class="search-result-tag">${tag}</span>`
                ).join('') : '';
                return `
                    <a href="${post.permalink}" class="search-result-item">
                        <div class="search-result-title">${highlightMatch(post.title, query)}</div>
                        <div class="search-result-meta">
                            <span class="search-result-date">${post.date}</span>
                            ${tagsHtml}
                        </div>
                    </a>
                `;
            }).join('');
        }
    }

    // 绑定搜索按钮点击事件
    if (searchBtn) {
        searchBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            toggleSearch();
        });
    }

    // 绑定确认搜索按钮点击事件
    if (searchConfirm) {
        searchConfirm.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            doSearch();
        });
    }

    // 绑定关闭按钮点击事件
    if (searchClose) {
        searchClose.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (searchOverlay.classList.contains('active')) {
                searchOverlay.classList.remove('active');
            }
        });
    }

    // 点击 overlay 背景关闭搜索
    if (searchOverlay) {
        searchOverlay.addEventListener('click', function(e) {
            if (e.target === searchOverlay && searchOverlay.classList.contains('active')) {
                searchOverlay.classList.remove('active');
            }
        });
    }

    // 支持回车键搜索
    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            doSearch();
        }
    });

    // 加载所有文章数据（包括文章和项目）
    function loadPosts() {
        if (allPosts.length > 0) return;

        {{ range where .Site.RegularPages "Section" "posts" }}
        allPosts.push({
            title: {{ .Title | jsonify | safeJS }},
            date: {{ .Date.Format "2006-01-02" | jsonify | safeJS }},
            permalink: {{ .Permalink | jsonify | safeJS }},
            tags: {{ if .Params.tags }}{{ delimit .Params.tags "\", \"" | printf "[\"%s\"]" | safeJS }}{{ else }}[]{{ end }},
            summary: {{ .Summary | truncate 100 | jsonify | safeJS }},
            section: "posts"
        });
        {{ end }}

        {{ range where .Site.RegularPages "Section" "projects" }}
        allPosts.push({
            title: {{ .Title | jsonify | safeJS }},
            date: {{ .Date.Format "2006-01-02" | jsonify | safeJS }},
            permalink: {{ .Permalink | jsonify | safeJS }},
            tags: {{ if .Params.tags }}{{ delimit .Params.tags "\", \"" | printf "[\"%s\"]" | safeJS }}{{ else }}[]{{ end }},
            summary: {{ .Summary | truncate 100 | jsonify | safeJS }},
            section: "projects"
        });
        {{ end }}
    }

    // 高亮匹配文本
    function highlightMatch(text, query) {
        const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
        return text.replace(regex, '<mark style="background: rgba(212, 175, 55, 0.3); color: var(--gold-light); padding: 0 2px; border-radius: 2px;">$1</mark>');
    }

    // 转义正则表达式特殊字符
    function escapeRegex(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // 支持键盘快捷键
    document.addEventListener('keydown', function(e) {
        // Ctrl/Cmd + K 打开搜索
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            if (!searchOverlay.classList.contains('active')) {
                toggleSearch();
            }
        }
        // ESC 关闭搜索
        if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
            searchOverlay.classList.remove('active');
        }
    });
</script>

<!-- 文章分页 -->
<script>
(function() {
    var POSTS_PER_PAGE = 5;
    var postList = document.getElementById('post-list');
    var paginationEl = document.getElementById('post-pagination');

    if (!postList || !paginationEl) return;

    var postCards = postList.querySelectorAll('.post-card');
    if (!postCards.length) return;

    var totalPages = Math.ceil(postCards.length / POSTS_PER_PAGE);
    if (totalPages <= 1) return;

    var currentPage = 1;

    function showPage(page) {
        currentPage = page;
        var start = (page - 1) * POSTS_PER_PAGE;
        var end = start + POSTS_PER_PAGE;

        for (var i = 0; i < postCards.length; i++) {
            if (i >= start && i < end) {
                postCards[i].style.display = '';
                postCards[i].style.animation = 'fadeInUp 0.4s ease';
            } else {
                postCards[i].style.display = 'none';
            }
        }

        renderButtons();
        paginationEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderButtons() {
        var zh = currentLang === 'zh';
        var prevText = zh ? '上一页' : 'Prev';
        var nextText = zh ? '下一页' : 'Next';
        var html = '';

        // 上一页
        var prevDisabled = currentPage === 1 ? ' disabled' : '';
        html += '<button class="pagination-btn' + prevDisabled + '" data-action="prev">' + prevText + '</button>';

        // 页码
        for (var i = 1; i <= totalPages; i++) {
            var active = i === currentPage ? ' active' : '';
            html += '<button class="pagination-btn' + active + '" data-action="page" data-page="' + i + '">' + i + '</button>';
        }

        // 下一页
        var nextDisabled = currentPage === totalPages ? ' disabled' : '';
        html += '<button class="pagination-btn' + nextDisabled + '" data-action="next">' + nextText + '</button>';

        paginationEl.innerHTML = html;
    }

    // 事件委托
    paginationEl.addEventListener('click', function(e) {
        var btn = e.target.closest('.pagination-btn');
        if (!btn || btn.classList.contains('disabled')) return;

        var action = btn.getAttribute('data-action');
        if (action === 'prev' && currentPage > 1) {
            showPage(currentPage - 1);
        } else if (action === 'next' && currentPage < totalPages) {
            showPage(currentPage + 1);
        } else if (action === 'page') {
            var page = parseInt(btn.getAttribute('data-page'));
            if (page !== currentPage) showPage(page);
        }
    });

    // 语言切换时重新渲染按钮
    document.addEventListener('languagechange', function() {
        if (totalPages > 1) renderButtons();
    });

    // 初始化
    showPage(1);
})();
</script>
