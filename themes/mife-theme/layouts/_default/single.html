{{ define "main" }}
<article class="single-article">
    <header class="article-header">
        <h1 class="article-title">{{ .Title }}</h1>
        <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
    </header>
    <div class="content">
        {{ .Content }}
    </div>
    <div class="article-footer">
        <a href="/" class="btn" data-zh="← 返回首页" data-en="← Back to Home">← 返回首页</a>
    </div>
</article>

<style>
    .single-article {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
    }

    .article-header {
        margin-bottom: 3rem;
    }

    .article-title {
        font-size: 2.5rem;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
    }

    .content {
        line-height: 2;
        color: var(--text-secondary);
    }

    .article-footer {
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border-color);
    }

    @media (max-width: 768px) {
        .single-article {
            padding: 1.5rem;
        }

        .article-title {
            font-size: 1.8rem;
        }

        .article-header {
            margin-bottom: 2rem;
        }
    }

    @media (max-width: 480px) {
        .single-article {
            padding: 1rem;
        }

        .article-title {
            font-size: 1.5rem;
        }

        .content {
            font-size: 0.95rem;
            line-height: 1.9;
        }
    }
</style>
{{ end }}
