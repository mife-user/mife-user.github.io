{{ define "main" }}
<article class="single-article project-page">
    <header class="article-header">
        <div class="project-type-badge" data-zh="项目" data-en="PROJECT">📦 项目</div>
        <h1 class="article-title">{{ .Title }}</h1>
        <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
        {{ with .Params.tags }}
        <div class="project-tags">
            {{ range . }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
    </header>
    {{ partial "toc.html" . }}
    <div class="content">
        {{ .Content }}
    </div>
    <div class="article-footer">
        <a href="/#projects" class="btn" data-zh="← 返回项目列表" data-en="← Back to Projects">← 返回项目列表</a>
    </div>

    {{ if .Site.Params.enableComments }}
        {{ partial "utterances-comments.html" . }}
    {{ end }}
</article>

<style>
    .single-article {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                    0 0 40px rgba(212, 175, 55, 0.1);
    }

    .project-type-badge {
        display: inline-block;
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        color: var(--bg-primary);
        padding: 0.5rem 1.2rem;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 1.5rem;
        text-transform: uppercase;
        box-shadow: 0 2px 8px rgba(212, 175, 55, 0.2);
    }

    .article-header {
        margin-bottom: 2.5rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border-color);
        position: relative;
    }

    .article-header::before {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 100px;
        height: 3px;
        background: linear-gradient(90deg, var(--gold-primary), var(--gold-light));
    }

    .article-title {
        font-size: 2.2rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.8rem;
        letter-spacing: 0.5px;
    }

    .post-date {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 1rem;
    }

    .project-tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 1rem;
    }

    .tag {
        background: var(--bg-card);
        color: var(--gold-primary);
        padding: 0.35rem 0.9rem;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        border: 1px solid rgba(212, 175, 55, 0.3);
        transition: all 0.3s ease;
    }

    .tag:hover {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
        color: var(--bg-primary);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
    }

    .content {
        line-height: 2;
        color: var(--text-secondary);
    }

    .content h1,
    .content h2,
    .content h3 {
        color: var(--text-primary);
        font-weight: 600;
        margin-top: 2rem;
        margin-bottom: 1rem;
    }

    .content h1 {
        font-size: 1.8rem;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 0.5rem;
    }

    .content h1:first-child {
        display: none;
    }

    .content h2 {
        font-size: 1.5rem;
    }

    .content h3 {
        font-size: 1.2rem;
    }

    .content a {
        color: var(--gold-light);
        text-decoration: none;
        transition: opacity 0.3s ease;
    }

    .content a:hover {
        opacity: 0.8;
        text-decoration: underline;
    }

    /* 目录样式 */
    .toc-container {
        margin: 0 0 2rem 0;
        padding: 1.2rem 1.5rem;
        background: rgba(26, 26, 26, 0.5);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        backdrop-filter: blur(5px);
    }

    .toc-container[open] {
        border-color: rgba(212, 175, 55, 0.3);
    }

    .toc-title {
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--gold-primary);
        letter-spacing: 1px;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        user-select: none;
    }

    .toc-title::-webkit-details-marker {
        display: none;
    }

    .toc-title::before {
        content: '▶';
        display: inline-block;
        font-size: 0.7rem;
        transition: transform 0.3s ease;
        color: var(--text-muted);
    }

    .toc-container[open] .toc-title::before {
        transform: rotate(90deg);
    }

    .toc-container #TableOfContents {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
    }

    .toc-container #TableOfContents ul {
        list-style: none;
        padding-left: 0;
        margin: 0;
    }

    .toc-container #TableOfContents > ul {
        padding-left: 0;
    }

    .toc-container #TableOfContents li {
        margin-bottom: 0.4rem;
        line-height: 1.7;
    }

    .toc-container #TableOfContents > ul > li {
        margin-bottom: 0.6rem;
    }

    .toc-container #TableOfContents a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.92rem;
        transition: all 0.25s ease;
        display: inline-block;
        padding: 0.15rem 0;
        border-bottom: 1px solid transparent;
    }

    .toc-container #TableOfContents > ul > li > a {
        color: var(--text-primary);
        font-weight: 500;
        font-size: 0.95rem;
    }

    .toc-container #TableOfContents a:hover {
        color: var(--gold-primary);
        border-bottom-color: var(--gold-primary);
    }

    .toc-container #TableOfContents ul ul {
        padding-left: 1.2rem;
        margin-top: 0.3rem;
        border-left: 2px solid rgba(212, 175, 55, 0.2);
    }

    .article-footer {
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border-color);
    }

    .btn {
        display: inline-block;
        background: var(--bg-card);
        color: var(--text-secondary);
        padding: 0.6rem 1.5rem;
        border-radius: 6px;
        text-decoration: none;
        border: 1px solid var(--border-color);
        transition: all 0.3s ease;
    }

    .btn:hover {
        background: var(--gold-primary);
        color: var(--bg-primary);
        border-color: var(--gold-primary);
    }

    @media (max-width: 768px) {
        .single-article {
            padding: 1.5rem;
        }

        .toc-container {
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
        }

        .toc-container #TableOfContents a {
            font-size: 0.88rem;
        }

        .toc-container #TableOfContents > ul > li > a {
            font-size: 0.92rem;
        }

        .article-title {
            font-size: 1.8rem;
        }

        .article-header {
            margin-bottom: 2rem;
        }
    }

    @media (max-width: 480px) {
        .single-article {
            padding: 1rem;
        }

        .article-title {
            font-size: 1.5rem;
        }

        .content {
            font-size: 0.95rem;
            line-height: 1.9;
        }
    }
</style>
{{ end }}
