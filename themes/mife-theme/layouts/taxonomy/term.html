{{ define "main" }}
<section class="section" style="padding-top: 120px;">
    <h2 class="section-title">标签：{{ .Title }}</h2>
    <div class="post-list">
        {{ range .Pages }}
        <article class="post-card">
            <div class="post-meta">
                <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                {{ with .Params.tags }}
                <div class="post-tags">
                    {{ range . }}
                    <a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}/" class="tag-link">{{ . }}</a>
                    {{ end }}
                </div>
                {{ end }}
            </div>
            <h3 class="post-title">
                <a href="{{ .Permalink }}">{{ .Title }}</a>
            </h3>
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
