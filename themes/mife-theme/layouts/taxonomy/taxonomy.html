{{ define "main" }}
<section class="section" style="padding-top: 120px;">
    <h2 class="section-title">{{ .Title }}</h2>
    <div class="post-list">
        {{ range .Pages }}
        <article class="post-card">
            <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
            <h3 class="post-title">
                <a href="{{ .Permalink }}">{{ .Title }}</a>
            </h3>
            <p class="post-excerpt">{{ .Summary | truncate 150 }}</p>
            <a href="{{ .Permalink }}" class="read-more" data-zh="阅读更多 →" data-en="Read More →">阅读更多 →</a>
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
