{{ define "main" }}
<!-- 友链页面 -->
<section class="section">
    <h2 class="section-title" data-zh="友链" data-en="FRIEND LINKS">友链</h2>
    
    <!-- 链接列表 -->
    <div class="links-grid">
        <!-- 示例链接 -->
        <div class="user-card">
            <a href="https://github.com/LeoninCS" target="_blank" class="user-link">
                <div class="user-avatar">
                    <img src="https://avatars.githubusercontent.com/u/147289645?v=4" alt="LeoninCS" class="avatar-img">
                </div>
                <h3 class="user-name">LeoninCS</h3>
                <p class="user-bio">go的up主</p>
            </a>
        </div>
        
        <!-- 更多链接可以在这里添加 -->
    </div>
    
    <!-- 添加链接按钮 -->
    <div class="add-link-container">
        <button class="btn add-link-btn" onclick="openAddLinkModal()" data-zh="添加链接" data-en="Add Link">添加链接</button>
    </div>
</section>

<!-- 添加链接模态框 -->
<div class="modal-overlay" id="addLinkModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 data-zh="添加友链" data-en="Add Friend Link">添加友链</h3>
            <button class="modal-close" onclick="closeAddLinkModal()">✕</button>
        </div>
        <div class="modal-body">
            <form id="addLinkForm">
                <div class="form-group">
                    <label for="blogName" data-zh="博客名称" data-en="Blog Name">博客名称</label>
                    <input type="text" id="blogName" required>
                </div>
                <div class="form-group">
                    <label for="blogUrl" data-zh="博客链接" data-en="Blog URL">博客链接</label>
                    <input type="url" id="blogUrl" required>
                </div>
                <div class="form-group">
                    <label for="blogDesc" data-zh="博客描述" data-en="Blog Description">博客描述</label>
                    <textarea id="blogDesc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="blogAvatar" data-zh="头像图片URL" data-en="Avatar Image URL">头像图片URL</label>
                    <input type="url" id="blogAvatar" placeholder="请输入头像图片的URL地址">
                    <small style="color: var(--text-muted); font-size: 0.8rem; display: block; margin-top: 0.5rem;" data-zh="您可以先将图片上传到图床服务，然后将URL粘贴到这里，或者在发送邮件时直接附带图片" data-en="You can upload the image to an image hosting service first, then paste the URL here, or attach the image directly when sending the email">您可以先将图片上传到图床服务，然后将URL粘贴到这里，或者在发送邮件时直接附带图片</small>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn cancel-btn" onclick="closeAddLinkModal()" data-zh="取消" data-en="Cancel">取消</button>
                    <button type="submit" class="btn submit-btn" data-zh="提交" data-en="Submit">提交</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // 打开添加链接模态框
    function openAddLinkModal() {
        document.getElementById('addLinkModal').classList.add('active');
    }
    
    // 关闭添加链接模态框
    function closeAddLinkModal() {
        document.getElementById('addLinkModal').classList.remove('active');
    }
    
    // 提交表单
    document.getElementById('addLinkForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 获取表单数据
        const blogName = document.getElementById('blogName').value.trim();
        const blogUrl = document.getElementById('blogUrl').value.trim();
        const blogDesc = document.getElementById('blogDesc').value.trim();
        const blogAvatar = document.getElementById('blogAvatar').value.trim();
        
        // 验证输入
        if (!blogName || !blogUrl || !blogDesc) {
            alert('请填写所有必填字段');
            return;
        }
        
        // 验证URL格式
        const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([/\w .-]*)*\/?$/;
        if (!urlPattern.test(blogUrl)) {
            alert('请输入有效的博客链接');
            return;
        }
        
        // 验证头像URL格式（如果提供了）
        if (blogAvatar && !urlPattern.test(blogAvatar)) {
            alert('请输入有效的头像图片URL');
            return;
        }
        
        // 构建邮件内容
        let emailBody = `博客名称: ${blogName}\n博客链接: ${blogUrl}\n博客描述: ${blogDesc}`;
        if (blogAvatar) {
            emailBody += `\n头像图片URL: ${blogAvatar}`;
        }
        const emailSubject = '申请添加友情链接';
        const emailTo = '{{ .Site.Params.email }}';
        
        // 打开邮件客户端
        window.location.href = `mailto:${emailTo}?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`;
        
        // 关闭模态框
        closeAddLinkModal();
    });
    
    // 点击模态框背景关闭
    document.getElementById('addLinkModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeAddLinkModal();
        }
    });
</script>
{{ end }}
